{% extends 'base.html' %}

{% block content %}
  <style>
    .patient-row { cursor: pointer; transition: all 0.2s ease; }
    .patient-row:hover, .patient-row.table-active { background-color: #eef6ff; transform: translateX(2px); }
    .preview-card { animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h3 class="mb-1">Dashboard</h3>
      <p class="text-muted mb-0">Overview of today&#39;s activity.</p>
    </div>
  </div>

  <div class="card shadow-sm mb-4 border-0 bg-light">
    <div class="card-body">
      <div class="row g-3 text-center align-items-center">
        <div class="col-md-6">
          <div class="p-2">
            <div class="text-muted small">Registered today</div>
            <div class="fs-3 fw-bold text-success" id="todayPatients">0</div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="p-2">
            <div class="text-muted small">Revisits</div>
            <div class="fs-3 fw-bold text-info" id="revisitPatients">0</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">Visit comparison</h5>
        <span class="text-muted small">New visits vs revisits</span>
      </div>
      <div class="row g-3">
        <div class="col-md-6">
          <div class="border rounded p-3 h-100">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <div class="text-muted small">New visits</div>
                <div class="fs-3 fw-bold text-primary" id="newVisitCount">0</div>
              </div>
              <span class="badge bg-primary">New</span>
            </div>
            <div class="progress mt-3" style="height: 10px;">
              <div class="progress-bar bg-primary" id="newVisitBar" style="width: 0%"></div>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="border rounded p-3 h-100">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <div class="text-muted small">Revisits</div>
                <div class="fs-3 fw-bold text-info" id="revisitComparisonCount">0</div>
              </div>
              <span class="badge bg-info text-dark">Revisit</span>
            </div>
            <div class="progress mt-3" style="height: 10px;">
              <div class="progress-bar bg-info" id="revisitBar" style="width: 0%"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const todayPatients = document.getElementById('todayPatients');
    const revisitPatients = document.getElementById('revisitPatients');
    const newVisitCount = document.getElementById('newVisitCount');
    const revisitComparisonCount = document.getElementById('revisitComparisonCount');
    const newVisitBar = document.getElementById('newVisitBar');
    const revisitBar = document.getElementById('revisitBar');

    async function refreshStats() {
      try {
        const response = await fetch('{{ url_for('dashboard_stats') }}');
        const data = await response.json();
        if (todayPatients) todayPatients.textContent = data.today_patients;
        if (revisitPatients) revisitPatients.textContent = data.revisit_patients;
        if (newVisitCount) newVisitCount.textContent = data.new_visit_patients;
        if (revisitComparisonCount) revisitComparisonCount.textContent = data.revisit_patients;

        const totalVisits = (data.new_visit_patients || 0) + (data.revisit_patients || 0);
        const newVisitPercent = totalVisits ? ((data.new_visit_patients || 0) / totalVisits) * 100 : 0;
        const revisitPercent = totalVisits ? ((data.revisit_patients || 0) / totalVisits) * 100 : 0;

        if (newVisitBar) newVisitBar.style.width = `${newVisitPercent}%`;
        if (revisitBar) revisitBar.style.width = `${revisitPercent}%`;
      } catch (error) {
        console.error('Could not refresh stats', error);
      }
    }

    refreshStats();
    setInterval(refreshStats, 5000);
  </script>
{% endblock %}
