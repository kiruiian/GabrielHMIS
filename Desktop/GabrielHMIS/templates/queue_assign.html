{% extends 'base.html' %}

{% block content %}
  <div class="container mt-4">
    <h3>Assign / Update Queue</h3>
    <p class="text-muted">Patient: <strong>{{ queue.patient.name }}</strong> — ID: <strong>{{ queue.patient.national_id }}</strong></p>

    <form method="post" action="{{ url_for('queue_assign', queue_id=queue.id) }}">
      <div class="mb-3">
        <label class="form-label">Doctor</label>
        <select name="doctor" class="form-select">
          <option value="">Unassigned</option>
          <option{% if queue.doctor=='Dr Kiprono' %} selected{% endif %}>Dr Kiprono</option>
          <option{% if queue.doctor=='Dr Kimutai' %} selected{% endif %}>Dr Kimutai</option>
          <option{% if queue.doctor=='Dr Chebet' %} selected{% endif %}>Dr Chebet</option>
          <option{% if queue.doctor=='Dr Nyaga' %} selected{% endif %}>Dr Nyaga</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Invoice / CR number</label>
        <input name="invoice_number" class="form-control" value="{{ queue.visit.invoice_number or '' }}">
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit">Save</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('dashboard') }}">Back</a>
      </div>
    </form>
  </div>
{% endblock %}
