{% extends 'base.html' %}

{% block content %}
  <div class="container mt-4">
      <div class="page-header d-flex justify-content-between align-items-center">
        <div>
          <h3>Edit Patient</h3>
          <p class="text-muted mb-0">Patient: <strong>{{ patient.full_name }}</strong> — ID: <strong>{{ patient.national_id }}</strong></p>
        </div>
      </div>
    <form method="post" action="{{ url_for('edit_patient', national_id=patient.national_id) }}">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">First name</label>
          <input type="text" name="first_name" class="form-control" required value="{{ patient.first_name or patient.display_first_name }}">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Other names</label>
          <input type="text" name="other_names" class="form-control" value="{{ patient.other_names or patient.display_other_names }}">
        </div>
      </div>
      <div class="row">
        <div class="col-md-3 mb-3">
          <label class="form-label">Age</label>
          <input type="number" name="age" class="form-control" value="{{ patient.age }}">
        </div>
        <div class="col-md-3 mb-3">
          <label class="form-label">Gender</label>
          <select name="gender" class="form-select">
            <option value="">Select</option>
            <option {% if patient.gender=='Male' %}selected{% endif %}>Male</option>
            <option {% if patient.gender=='Female' %}selected{% endif %}>Female</option>
            <option {% if patient.gender=='Other' %}selected{% endif %}>Other</option>
          </select>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control" value="{{ patient.phone }}">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Address</label>
        <textarea name="address" class="form-control" rows="2">{{ patient.address }}</textarea>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit">Save changes</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('patient_details', national_id=patient.national_id) }}">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
